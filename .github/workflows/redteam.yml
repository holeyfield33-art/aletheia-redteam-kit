name: redteam

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security scanners
        run: |
          python -m pip install --upgrade pip
          pip install semgrep trufflehog

      - name: Run repo security gates
        run: |
          python scripts/run_security_gates.py \
            --repo-root . \
            --secret-allowlist .aletheia-secret-allowlist \
            --semgrep-rules security/semgrep-rules.yml \
            --semgrep-suppressions security/semgrep-suppressions.txt \
            --output security_gates.json

      - name: Upload security gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-gates-report
          path: security_gates.json

  command-center-combined:
    runs-on: ubuntu-latest
    needs: security-gates
    env:
      ALETHEIA_MIN_EXPECTATION_MATCH: "60"
      ALETHEIA_MAX_HIGH_RISK_BLOCK_DROP: "3"
      ALETHEIA_MAX_REPO_CRITICAL: "0"
      ALETHEIA_MAX_REPO_HIGH: "5"
      ALETHEIA_WEBSITE_MAX_CRITICAL: "0"
      ALETHEIA_WEBSITE_MAX_HIGH: "5"
      ALETHEIA_WEBSITE_MIN_PASS_RATE: "80"
      ALETHEIA_THREAT_FEED_FILE: "threat_feed.json"
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Check API key availability
        id: key_check
        run: |
          if [ -z "${ALETHEIA_API_KEY}" ]; then
            echo "Missing ALETHEIA_API_KEY secret; skipping combined sweep"
            echo "has_api_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_api_key=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          ALETHEIA_API_KEY: ${{ secrets.ALETHEIA_API_KEY }}

      - name: Run Combined Command-Center Sweep
        if: steps.key_check.outputs.has_api_key == 'true'
        run: |
          git fetch origin main --depth=1
          if git show origin/main:summary.json > baseline_summary.json 2>/dev/null; then
            echo "Loaded baseline summary from origin/main"
          else
            echo "{}" > baseline_summary.json
            echo "No baseline summary found on origin/main"
          fi

          if command -v pip-audit >/dev/null 2>&1; then
            pip-audit -f json -o pip-audit-report.json || true
          else
            echo "pip-audit not installed; skipping dependency advisory enrichment"
          fi

          python -m kit.runner \
            --mode combined \
            --target-url "${ALETHEIA_TARGET_URL}" \
            --repo-path . \
            --threat-feed-file "${ALETHEIA_THREAT_FEED_FILE}" \
            --output ci_summary.json \
            --min-expectation-match-rate "${ALETHEIA_MIN_EXPECTATION_MATCH}" \
            --api-baseline-summary baseline_summary.json \
            --max-high-risk-block-drop "${ALETHEIA_MAX_HIGH_RISK_BLOCK_DROP}" \
            --max-repo-critical "${ALETHEIA_MAX_REPO_CRITICAL}" \
            --max-repo-high "${ALETHEIA_MAX_REPO_HIGH}" \
            --max-critical "${ALETHEIA_WEBSITE_MAX_CRITICAL}" \
            --max-high "${ALETHEIA_WEBSITE_MAX_HIGH}" \
            --min-pass-rate "${ALETHEIA_WEBSITE_MIN_PASS_RATE}"
        env:
          ALETHEIA_API_KEY: ${{ secrets.ALETHEIA_API_KEY }}
          ALETHEIA_TARGET_URL: ${{ vars.ALETHEIA_TARGET_URL }}

      - name: Write skipped summary when API key is unavailable
        if: steps.key_check.outputs.has_api_key != 'true'
        run: |
          cat > ci_summary.json <<'JSON'
          {
            "mode": "combined",
            "skipped": true,
            "reason": "missing_ALETHEIA_API_KEY",
            "gates": {
              "pass": true,
              "violations": []
            },
            "components": {
              "api": {
                "skipped": true,
                "reason": "missing_ALETHEIA_API_KEY"
              },
              "website": {
                "skipped": true,
                "reason": "missing_ALETHEIA_API_KEY"
              },
              "repo": {
                "skipped": true,
                "reason": "missing_ALETHEIA_API_KEY"
              }
            }
          }
          JSON

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: command-center-summary
          path: ci_summary.json

      - name: Comment PR summary
        if: github.event_name == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f ci_summary.json ]; then
            echo "ci_summary.json missing; skipping PR comment"
            exit 0
          fi
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("ci_summary.json").read_text())
          gates = data.get("gates") or {}
          components = data.get("components") or {}
          api = components.get("api") or {}
          repo = components.get("repo") or {}
          website = components.get("website") or {}
          regression = api.get("regression") or {}
          cats = api.get("categories", {})
          repo_sev = repo.get("findings_by_severity") or {}
          website_sev = website.get("findings_by_severity") or {}
          lines = [
              "## Command-Center Combined Report",
              "",
              f"- Overall gate: {'PASS' if gates.get('pass') else 'FAIL'}",
              f"- Violations: {', '.join(gates.get('violations', [])) or 'none'}",
              "",
              "### API",
              f"- Expectation match: {api.get('expectation_match_rate', 0)}%",
              f"- Block rate: {api.get('block_rate', 0)}%",
              f"- Blocked: {api.get('blocked', 0)}/{api.get('attacks_total', 0)}",
              f"- Unknown decisions: {api.get('unknown', 0)}",
              f"- Empty-200 anomalies: {api.get('empty_200_anomalies', 0)}",
              f"- High-risk block rate (baseline/current): {regression.get('baseline_high_risk_block_rate', 'n/a')}% / {regression.get('current_high_risk_block_rate', 'n/a')}%",
              f"- High-risk block-rate drop: {regression.get('high_risk_block_rate_drop', 'n/a')}%",
              "",
              "### Repo",
              f"- Risk score: {repo.get('risk_score', 'n/a')}",
              f"- Findings total: {repo.get('findings_total', 0)}",
              f"- Critical/High: {repo_sev.get('CRITICAL', 0)}/{repo_sev.get('HIGH', 0)}",
              "",
              "### Website",
              f"- Findings total: {website.get('findings_total', 0)}",
              f"- Pass rate: {website.get('pass_rate', 'n/a')}%",
              f"- Critical/High: {website_sev.get('CRITICAL', 0)}/{website_sev.get('HIGH', 0)}",
              "",
              "| Category | Blocked | Total |",
              "|---|---:|---:|",
          ]
          for name in sorted(cats):
              row = cats[name]
              lines.append(f"| {name} | {row.get('blocked', 0)} | {row.get('total', 0)} |")
          Path("pr_comment.md").write_text("\n".join(lines) + "\n")
          PY
          gh pr comment "${{ github.event.pull_request.number }}" --body-file pr_comment.md
